<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Publiez votre jeu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Bitcount+Prop+Double:wght@100..900&family=Bitcount+Prop+Single:wght@100..900&family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Chivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Bitcount+Prop+Double:wght@100..900&family=Chivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      
    />
  </head>
  <body>
    
    <header class="header">
      <h1>Publiez votre jeu</h1>
    </header>

    <main class="container">
      <section class="section">
        <h2>informations principales</h2>

        <div class="row">
          <div class="field">
            <label>Nom du jeu</label>
            <input type="text" placeholder="Mon jeu" />
          </div>

          <div class="field">
            <label>Créé par</label>
            <input type="text" placeholder="Nom Prénom" />
          </div>

          <div class="field">
            <label>Votre adresse email</label>
            <input type="email" placeholder="MonAdresse@gmail.com" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Genre</label>
            <input type="text" placeholder="Rpg" />
          </div>

          <div class="field">
            <h2>Plateformes</h2>

            <div class="checkbox-group">
              <label><input type="checkbox" /> Windows</label>
              <label><input type="checkbox" /> Linux</label>
              <label><input type="checkbox" /> Web</label>
              <label><input type="checkbox" /> macOS</label>
              <label><input type="checkbox" /> Autre</label>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Description et informations supplémentaires</h2>
        <div class="description-grid">
          <div class="field">
            <label>Description du jeu</label>
            <textarea
              type="text"
              placeholder="Jeu d'aventure dans lequel vous incarnez..."
            ></textarea>
          </div>

          <div class="field">
            <label>Tutoriel d’installation/lancement du jeu</label>
            <textarea
              type="text"
              placeholder="Cliquez sur le lien vers le jeu..."
            ></textarea>
          </div>
          <div class="field">
            <label>Liste de contrôles requis</label>
            <textarea
              type="text"
              placeholder="Avancer : w
Saisir un objet : e"
            ></textarea>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Bouton de lancement</h2>

<div class="launch-grid">

    <div class="field">
        <label>Texte contextuel du bouton</label>
        <input type="text" placeholder="itch.io">
    </div>

    <div class="field">
        <label>Lien vers le jeu</label>
        <input type="text" placeholder="https://ex.itch.io/ex">
    </div>

    <div class="field">
        <label>Déposer votre couverture</label>

        <div class="upload-box">
            <p>Charger à partir de cet appareil</p>
        </div>
    </div>

</div>

      <div class="footer-form">
        <label>
          J’ai lu et accepté les conditions
          <input type="checkbox" />
        </label>

        <button> <a href="succes.html">Publier</a></button>
      </div>
    </main>

    <footer class="footer">
      <p class="footer-title">Publiez votre jeu sur Epic Game Jam</p>

      <div class="footer-links">
        <a href="#">Politique de confidentialité</a>
        <a href="#">Conditions générales</a>
        <a href="#">à propos</a>
        <a href="#">Aide</a>
        <a href="#">Nous contacter</a>
      </div>
    </footer>
  </body>
</html>
